name: Deploy to VPS

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_RECAPTCHA_SITE_KEY=${{ secrets.NEXT_PUBLIC_RECAPTCHA_SITE_KEY }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/lernassistent

            # Update repo (for migrations and seed)
            cd repo && git pull && cd ..

            # Pull latest image
            docker compose pull app

            # Run migrations via repo container
            export DB_URL="postgresql://postgres:$(grep POSTGRES_PASSWORD .env | cut -d= -f2)@lernassistent-db:5432/lernassistent"
            docker run --rm --network lernassistent_internal -e DATABASE_URL="$DB_URL" -v "$(pwd)/repo:/app" -w /app node:20-alpine sh -c "npm ci --ignore-scripts && npx prisma generate && npx prisma migrate deploy"

            # Restart app with new image
            docker compose up -d

            # Cleanup old images
            docker image prune -f

            # Health check
            sleep 15
            docker exec lernassistent-app wget -q --spider http://localhost:3000/api/health && echo "Deploy successful!" || echo "Health check failed"
